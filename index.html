<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram 2012 iPhone 4</title>
    <style>
        /* Reset base */
        body, h1, h2, h3, h4, p, ul, li {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            font-size: 12px;
        }

        /* Header */
        header {
            width: 100%;
            height: 50px;
            background-color: #fff;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        header .logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 24px;
        }

        header .icons {
            display: flex;
            gap: 10px;
        }

        header .icons img {
            width: 24px;
            height: 24px;
        }

        /* Feed */
        .feed {
            margin-top: 50px;
            width: 100%;
        }

        .post {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            margin-bottom: 10px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 5px;
        }

        .post-header img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .post-image img {
            width: 100%;
            display: block;
        }

        .post-caption {
            padding: 5px;
        }

        /* Sidebar / mobile: tutto sotto feed */
        .profile, .suggestions {
            width: 100%;
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 5px;
            margin-bottom: 10px;
        }

        .profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .profile div {
            display: inline-block;
            vertical-align: top;
        }

        .suggestions .user {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .suggestions .user img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* Mobile-specific */
        @media only screen and (min-width: 321px) {
            body {
                display: flex;
                justify-content: center;
            }

            .container {
                display: flex;
                max-width: 600px;
            }

            .feed {
                width: 400px;
            }

            .sidebar {
                width: 200px;
                margin-left: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Instagram</div>
        <div class="icons">
            <img src="https://via.placeholder.com/24" alt="Home">
            <img src="https://via.placeholder.com/24" alt="Messaggi">
        </div>
    </header>

    <div class="feed">
        <!-- Post 1 -->
        <div class="post">
            <div class="post-header">
                <img src="https://via.placeholder.com/30" alt="Avatar">
                <strong>utente1</strong>
            </div>
            <div class="post-image">
                <img src="https://via.placeholder.com/320x320" alt="Post">
            </div>
            <div class="post-caption">
                Questo è un post di esempio su iPhone 4!
            </div>
        </div>

        <!-- Post 2 -->
        <div class="post">
            <div class="post-header">
                <img src="https://via.placeholder.com/30" alt="Avatar">
                <strong>utente2</strong>
            </div>
            <div class="post-image">
                <img src="https://via.placeholder.com/320x320" alt="Post">
            </div>
            <div class="post-caption">
                Altro post vintage del 2012.
            </div>
        </div>

        <!-- Profilo / suggerimenti sotto feed per mobile -->
        <div class="profile">
            <img src="https://via.placeholder.com/40" alt="Profilo">
            <div>
                <strong>mio_profilo</strong><br>
                <span>Il mio profilo</span>
            </div>
        </div>

        <div class="suggestions">
            <h4>Persone da seguire</h4>
            <div class="user">
                <img src="https://via.placeholder.com/30" alt="utente3">
                <span>utente3</span>
            </div>
            <div class="user">
                <img src="https://via.placeholder.com/30" alt="utente4">
                <span>utente4</span>
            </div>
        </div>
    </div>
</body>
</html>
