<!DOCTYPE html>
<html lang="it">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram 2012 Clone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fafafa;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            border-bottom: 1px solid #dbdbdb;
            padding: 10px 20px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        header .logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 28px;
            color: #262626;
        }

        header input[type="text"] {
            padding: 5px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
        }

        header nav a {
            margin-left: 15px;
            text-decoration: none;
            color: #262626;
            font-weight: bold;
        }

        /* Main content */
        .container {
            display: flex;
            justify-content: center;
            margin-top: 70px;
        }

        .feed {
            width: 500px;
        }

        .post {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            margin-bottom: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 10px;
        }

        .post-header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .post-image img {
            width: 100%;
        }

        .post-caption {
            padding: 10px;
            font-size: 14px;
            color: #262626;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            margin-left: 20px;
        }

        .profile {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 10px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .suggestions {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 10px;
        }

        .suggestions h4 {
            margin-top: 0;
        }

        .suggestions .user {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .suggestions .user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Instagram</div>
        <input type="text" placeholder="Cerca">
        <nav>
            <a href="#">Home</a>
            <a href="#">Profilo</a>
            <a href="#">Messaggi</a>
        </nav>
    </header>

    <div class="container">
        <div class="feed">
            <div class="post">
                <div class="post-header">
                    <img src="https://via.placeholder.com/32" alt="Avatar">
                    <strong>utente1</strong>
                </div>
                <div class="post-image">
                    <img src="https://via.placeholder.com/500x500" alt="Post image">
                </div>
                <div class="post-caption">
                    Questo è un post di esempio nel 2012!
                </div>
            </div>

            <div class="post">
                <div class="post-header">
                    <img src="https://via.placeholder.com/32" alt="Avatar">
                    <strong>utente2</strong>
                </div>
                <div class="post-image">
                    <img src="https://via.placeholder.com/500x500" alt="Post image">
                </div>
                <div class="post-caption">
                    Altro post con immagine e didascalia.
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="profile">
                <img src="https://via.placeholder.com/50" alt="Profile">
                <div>
                    <strong>mio_profilo</strong><br>
                    <span>Il mio profilo</span>
                </div>
            </div>

            <div class="suggestions">
                <h4>Persone da seguire</h4>
                <div class="user">
                    <img src="https://via.placeholder.com/32" alt="User">
                    <span>utente3</span>
                </div>
                <div class="user">
                    <img src="https://via.placeholder.com/32" alt="User">
                    <span>utente4</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
